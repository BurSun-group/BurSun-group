<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BurSun | Burning Sun</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: #000000; 
            color: #f0f0f0; 
            font-family: 'Segoe UI', 'Courier New', monospace; 
            line-height: 1.6;
            position: relative;
            z-index: 1;
        }
        
        /* Красноватое свечение вместо картинки (работает 100%) */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(180, 34, 34, 0.25), rgba(0,0,0,0) 70%);
            pointer-events: none; 
            z-index: 0;
        }
        
        .wrapper { 
            max-width: 1100px; 
            margin: 0 auto; 
            padding: 20px;
            position: relative;
            z-index: 2;
        }
        
        header { 
            text-align: center; 
            padding: 30px 0 20px; 
            border-bottom: 3px solid #b22222; 
        }
        
        h1 { 
            font-size: 3.5em; 
            letter-spacing: 4px; 
            color: #b22222; 
            text-shadow: 3px 3px 0 #ffffff30; 
        }
        
        .sub { 
            font-size: 1.2em; 
            color: #cccccc; 
            margin-top: 5px; 
        }
        
        nav { 
            margin: 25px 0; 
            text-align: center; 
        }
        
        nav a { 
            color: #ffffff; 
            text-decoration: none; 
            font-weight: bold; 
            margin: 0 15px; 
            padding: 6px 12px; 
            border: 1px solid #b22222; 
            border-radius: 30px; 
            transition: 0.3s; 
            display: inline-block; 
            background: transparent;
        }
        
        nav a:hover { 
            background: #b22222; 
            color: #000; 
            border-color: #fff; 
            box-shadow: 0 0 8px red; 
        }
        
        .social-links { 
            text-align: center; 
            margin: 20px 0 10px; 
        }
        
        .social-links a { 
            color: #b22222; 
            text-decoration: none; 
            font-weight: bold; 
            margin: 0 12px; 
            font-size: 1.1em; 
            border-bottom: 1px dashed #b22222; 
        }
        
        .social-links a:hover { 
            color: #fff; 
            border-bottom-color: #fff; 
        }
        
        main { 
            background: #0a0a0a; 
            padding: 25px; 
            border-left: 2px solid #b22222; 
            border-right: 2px solid #b22222; 
            margin: 20px 0; 
        }
        
        footer { 
            text-align: center; 
            font-size: 0.8em; 
            color: #555; 
            border-top: 1px solid #b22222; 
            padding-top: 20px; 
            margin-top: 20px; 
        }
        
        .member { 
            margin: 12px 0; 
            border-left: 4px solid #b22222; 
            padding-left: 15px; 
        }
        
        .member strong { 
            font-size: 1.2em; 
        }
        
        ul { 
            list-style: none; 
            padding-left: 0; 
        }
        
        ul.albums { 
            list-style-type: square; 
            padding-left: 25px; 
        }
        
        .contacts-list li { 
            margin-bottom: 10px; 
        }
        
        a { 
            color: #b22222; 
        }
    </style>
</head>
<body>
<div class="wrapper">
    <header>
        <h1>BurSun</h1>
        <div class="sub">Burning Sun (Горящее солнце)</div>
    </header>
    
    <nav>
        <a href="#" onclick="showPage('home')">Главная</a>
        <a href="#" onclick="showPage('band')">Участники</a>
        <a href="#" onclick="showPage('music')">Музыка</a>

    <div class="social-links">

        📱 Telegram: <a href="https://t.me/bursungroup" target="_blank">t.me/bursungroup</a>

    <footer>
       |BurSun — горящее солнце тяжёлого металла 🤘 | 
    </footer>
</div>

                    <li class="member"><strong>Захар Табунщиков</strong> — Вокал🎤 <a href="https://vk.ru/outssiderrr" target="_blank">-*клик*-Главный Горлопан, ультракрикун.-*клик*-</a></li>
                    <li class="member"><strong>Игорь Кудрявцев</strong> — Бас🎸 <a href="https://vk.ru/kudr9vcev_irrr" target="_blank">-*клик*-Сигма-мен, Повелитель низких частот.-*клик*-</a></li>

</script>
</body>
</html>
