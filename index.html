<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BurSun | Burning Sun</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: #000000; 
            color: #f0f0f0; 
            font-family: 'Segoe UI', 'Courier New', monospace; 
            line-height: 1.6;
            position: relative;
            z-index: 1;
        }
        
        /* Красноватое свечение */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(180, 34, 34, 0.25), rgba(0,0,0,0) 70%);
            pointer-events: none; 
            z-index: 0;
        }
        
        .wrapper { 
            max-width: 1100px; 
            margin: 0 auto; 
            padding: 20px;
            position: relative;
            z-index: 2;
        }
        
        /* Блок поиска — УМЕНЬШЕННЫЕ ОТСТУПЫ */
        .search-container {
            text-align: center;
            margin: 0 0 5px 0;
            padding: 10px 0;
            border-bottom: 1px solid #b22222;
        }
        
        #searchInput {
            padding: 8px 18px;
            width: 260px;
            border-radius: 40px;
            border: 1px solid #b22222;
            background: #1a1a1a;
            color: #fff;
            font-size: 0.95em;
            outline: none;
            transition: 0.3s;
        }
        
        #searchInput:focus {
            border-color: #ff4444;
            box-shadow: 0 0 8px red;
        }
        
        #searchClear {
            padding: 8px 18px;
            border-radius: 40px;
            background: #b22222;
            color: #fff;
            border: none;
            cursor: pointer;
            margin-left: 10px;
            font-weight: bold;
            transition: 0.3s;
        }
        
        #searchClear:hover {
            background: #ff4444;
        }
        
        /* Шапка — УМЕНЬШЕННЫЙ ВЕРХНИЙ ОТСТУП */
        header { 
            text-align: center; 
            padding: 15px 0 20px;
            border-bottom: 3px solid #b22222; 
        }
        
        h1 { 
            font-size: 3.5em; 
            letter-spacing: 4px; 
            color: #b22222; 
            text-shadow: 3px 3px 0 #ffffff30; 
        }
        
        .sub { 
            font-size: 1.2em; 
            color: #cccccc; 
            margin-top: 5px; 
        }
        
        nav { 
            margin: 25px 0; 
            text-align: center; 
        }
        
        nav a { 
            color: #ffffff; 
            text-decoration: none; 
            font-weight: bold; 
            margin: 0 15px; 
            padding: 6px 12px; 
            border: 1px solid #b22222; 
            border-radius: 30px; 
            transition: 0.3s; 
            display: inline-block; 
            background: transparent;
        }
        
        nav a:hover { 
            background: #b22222; 
            color: #000; 
            border-color: #fff; 
            box-shadow: 0 0 8px red; 
        }
        
        .social-links { 
            text-align: center; 
            margin: 20px 0 10px; 
        }
        
        .social-links a { 
            color: #b22222; 
            text-decoration: none; 
            font-weight: bold; 
            margin: 0 12px; 
            font-size: 1.1em; 
            border-bottom: 1px dashed #b22222; 
        }
        
        .social-links a:hover { 
            color: #fff; 
            border-bottom-color: #fff; 
        }
        
        main { 
            background: #0a0a0a; 
            padding: 25px; 
            border-left: 2px solid #b22222; 
            border-right: 2px solid #b22222; 
            margin: 20px 0; 
        }
        
        footer { 
            text-align: center; 
            font-size: 0.8em; 
            color: #555; 
            border-top: 1px solid #b22222; 
            padding-top: 20px; 
            margin-top: 20px; 
        }
        
        .member { 
            margin: 12px 0; 
            border-left: 4px solid #b22222; 
            padding-left: 15px; 
        }
        
        .member strong { 
            font-size: 1.2em; 
        }
        
        ul { 
            list-style: none; 
            padding-left: 0; 
        }
        
        ul.albums { 
            list-style-type: square; 
            padding-left: 25px; 
        }
        
        .contacts-list li { 
            margin-bottom: 10px; 
        }
        
        a { 
            color: #b22222; 
        }

        mark {
            background: #ffcc00;
            color: #000000;
            padding: 0 2px;
            border-radius: 4px;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="wrapper">
    
    <!-- ПОИСК ВВЕРХУ -->
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="🔍 Поиск по сайту...">
        <button id="searchClear">✖</button>
    </div>
    
    <header>
        <h1>BurSun</h1>
        <div class="sub">Burning Sun (Горящее солнце)</div>
    </header>
    
    <nav>
        <a href="#" onclick="showPage('home')">Главная</a>
        <a href="#" onclick="showPage('band')">Участники</a>
        <a href="#" onclick="showPage('music')">Музыка</a>
        <a href="#" onclick="showPage('merch')">Мерч</a>
        <a href="#" onclick="showPage('contacts')">Контакты</a>
    </nav>
    
    <div class="social-links">
        🎸 VK: <a href="https://vk.com/bursunofficial" target="_blank">vk.com/bursunofficial</a>   |  
        📱 Telegram: <a href="https://t.me/bursungroup" target="_blank">t.me/bursungroup</a>
    </div>
    
    <main id="content">
        <!-- Контент подгружается сюда -->
    </main>
    
    <footer>
       |<i> BurSun — горящее солнце тяжёлого металла 🤘 </i>|
    </footer>
</div>

<script>
    let currentPage = 'home';

    function clearHighlights() {
        const content = document.getElementById('content');
        if (!content) return;
        const marks = content.querySelectorAll('mark');
        marks.forEach(mark => {
            const parent = mark.parentNode;
            const text = document.createTextNode(mark.textContent);
            parent.replaceChild(text, mark);
            parent.normalize();
        });
    }

    function highlightText(searchTerm) {
        if (!searchTerm.trim()) return;
        const content = document.getElementById('content');
        const walker = document.createTreeWalker(content, NodeFilter.SHOW_TEXT, {
            acceptNode: function(node) {
                if (node.parentElement && (node.parentElement.tagName === 'SCRIPT' || node.parentElement.tagName === 'STYLE')) {
                    return NodeFilter.FILTER_REJECT;
                }
                return NodeFilter.FILTER_ACCEPT;
            }
        });
        const textNodes = [];
        while (walker.nextNode()) textNodes.push(walker.currentNode);
        
        const regex = new RegExp(`(${searchTerm.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
        textNodes.forEach(node => {
            const original = node.nodeValue;
            if (regex.test(original)) {
                const span = document.createElement('span');
                span.innerHTML = original.replace(regex, `<mark>$1</mark>`);
                node.parentNode.replaceChild(span, node);
            }
        });
    }

    function showPage(page) {
        currentPage = page;
        const contentDiv = document.getElementById('content');
        if (page === 'home') {
            contentDiv.innerHTML = `
                <h2 style="color:#b22222;">⚡ Добро пожаловать в Burning Sun ⚡</h2>
                <p>Всем привет, солдаты! На связи — <strong>☀️ BurSun ☀️</strong>.</p>
                <p><strong>BurSun</strong> — это энергия горящего солнца, переплавленная в тяжёлые риффы и агрессивный драйв. Мы играем современный метал 🤘.</p>
                <p>🔥 Новый сингл: <strong><i>скоро</i></strong></p>
                <p>🎤 Ближайший концерт: <strong><i>скоро</i></strong></p>
                <p><i>Следи за новостями в наших соцсетях — ссылки вверху страницы.</i></p>
            `;
        } else if (page === 'band') {
            contentDiv.innerHTML = `
                <h2 style="color:#b22222;">🔥 Участники группы 🔥</h2>
                <ul>
                    <li class="member"><strong>Стёпа Федоренко</strong> — Гитара🎸 <a href="https://vk.ru/anyagio" target="_blank"><i>-*клик*-</i>Металлический Диско-шар, главный по риффам.<i>-*клик*-</i></a></li>
                    <li class="member"><strong>Роман Яценко</strong> — Ударные🥁 <a href="https://vk.ru/id949084635" target="_blank"><i>-*клик*-</i>Идейный вдохновитель, заведующий ритмом.<i>-*клик*-</i></a></li>
                    <li class="member"><strong>Илья Савчук</strong> — Гитара🎸 <a href="https://vk.ru/lord_7567" target="_blank"><i>-*клик*-</i>Гитарист, главнй продажник.<i>-*клик*-</i></a></li>
                    <li class="member"><strong>Захар Табунщиков</strong> — Вокал🎤 <a href="https://vk.ru/outssiderrr" target="_blank"><i>-*клик*-</i>Главный Горлопан, ультракрикун.<i>-*клик*-</i></a></li>
                    <li class="member"><strong>Игорь Кудрявцев</strong> — Бас🎸 <a href="https://vk.ru/kudr9vcev_irrr" target="_blank"><i>-*клик*-</i>Сигма-мен, Повелитель низких частот.<i>-*клик*-</i></a></li>
                </ul>
                <p><em>«Каждый из нас — частица раскалённого светила»</em></p>
            `;
        } else if (page === 'music') {
            contentDiv.innerHTML = `
                <h2 style="color:#b22222;">🎵 Дискография 🎵</h2>
                <ul class="albums">
                    <li><strong></strong></li>
                    <li><strong></strong></li>
                    <li><strong></strong></li>
                </ul>
                <p>🎧 Слушать на цифровых площадках <i>(скоро)</i>:<br>
                | <a href="#">VK Музыка</a> | <a href="#">Яндекс.Музыка</a> |
                </p>
            `;
        } else if (page === 'merch') {
            contentDiv.innerHTML = `
                <h2 style="color:#b22222;">🧷 Фирменные метал-безделушки 🧷</h2>
                <ul>
                    <li>👕 Футболка с логотипом — <i>скоро</i></li>
                    <li>🧢 Кепка BurSun — <i>скоро</i></li>
                    <li>💀 Патч на куртку — <i>скоро</i></li>
                    <li>🎸 Медиаторы с символикой — <i>скоро</i></li>
                </ul>
                <p>Следите за анонсами в соцсетях! 🔥</p>
            `;
        } else if (page === 'contacts') {
            contentDiv.innerHTML = `
                <h2 style="color:#b22222;">📬 Контакты</h2>
                <p>По вопросам выступлений, интервью и сотрудничества:</p>
                <ul class="contacts-list">
                    <li>📧 Email: <a href="mailto:burnsun@metal.ru"> bursun.group.of@gmail.com</a></li>
                    <li>📱 Telegram: <a href="https://t.me/bursungroup" target="_blank">t.me/bursungroup</a></li>
                    <li>🔗 VK: <a href="https://vk.com/bursunofficial" target="_blank">vk.com/bursunofficial</a></li>
                </ul>
                <p>Менеджмент: +7 (999) 123-45-67</p>
            `;
        }
        const searchInput = document.getElementById('searchInput');
        if (searchInput) searchInput.value = '';
        clearHighlights();
    }

    const searchInput = document.getElementById('searchInput');
    if (searchInput) {
        searchInput.addEventListener('input', function(e) {
            const term = e.target.value.trim();
            clearHighlights();
            if (term !== '') {
                highlightText(term);
            }
        });
    }

    const clearBtn = document.getElementById('searchClear');
    if (clearBtn) {
        clearBtn.addEventListener('click', function() {
            const searchInput = document.getElementById('searchInput');
            if (searchInput) searchInput.value = '';
            clearHighlights();
        });
    }

    showPage('home');
</script>
</body>
</html>
